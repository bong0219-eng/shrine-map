<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="성지 순례 지도">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#4a6741">
<link rel="manifest" href="data:application/json;charset=utf-8,%7B%22name%22%3A%22%ED%95%9C%EA%B5%AD%20%EC%B2%9C%EC%A3%BC%EA%B5%90%20%EC%84%B1%EC%A7%80%20%EC%88%9C%EB%A1%80%20%EC%A7%80%EB%8F%84%22%2C%22short_name%22%3A%22%EC%84%B1%EC%A7%80%20%EC%88%9C%EB%A1%80%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%230e1535%22%2C%22theme_color%22%3A%22%230e1535%22%2C%22start_url%22%3A%22.%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox%3D'0%200%20100%20100'%3E%3Crect%20width%3D'100'%20height%3D'100'%20fill%3D'%230e1535'%2F%3E%3Ctext%20y%3D'.9em'%20font-size%3D'80'%20x%3D'10'%3E%E2%9C%9D%3C%2Ftext%3E%3C%2Fsvg%3E%22%2C%22sizes%22%3A%22any%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">
<title>한국 천주교 성지 순례 지도</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;600&display=swap');

  :root {
    --cream: #f5f0e8;
    --warm-white: #faf7f0;
    --ink: #1a2456;
    --ink-mid: #2d3a7a;
    --ink-light: #5a6494;
    --border: #c8cfe8;
    --border-light: #dde3f2;
    --gold: #b8965a;
    --gold-bright: #d4aa6a;
    --gold-pale: #f0e4cc;
    --navy-deep: #0e1535;
    --navy-mid: #1a2456;
    --navy-light: #243070;
    --navy-card: #f7f5f0;
    --shrine-color: #c0392b;
    --shrine-bg: #fff5f4;
    --shrine-border: #f5b8b0;
    --pilgrim-color: #1565c0;
    --pilgrim-bg: #f0f5ff;
    --pilgrim-border: #90b8f0;
    --martyr-color: #1b7a3e;
    --martyr-bg: #f0faf4;
    --martyr-border: #80cc9a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #f5f6f8;
    color: var(--ink);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  #header {
    background: var(--navy-deep);
    border-bottom: 1px solid rgba(212,170,106,0.25);
    padding: 0 16px;
    display: flex; align-items: center; gap: 12px;
    height: 50px;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  #header h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: 16px; font-weight: 600;
    color: #f5edd8;
    letter-spacing: 0.03em;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  @media (max-width: 768px) {
    #header h1 { font-size: 14px; letter-spacing: 0.01em; }
  }

  /* ── CONTROLS ── */
  #controls {
    background: var(--navy-mid);
    border-bottom: 1px solid rgba(212,170,106,0.2);
    padding: 8px 16px;
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
    flex-shrink: 0;
  }
  .sep { width: 1px; height: 20px; background: rgba(212,170,106,0.2); margin: 0 4px; }

  /* ── 교구 셀렉트 ── */
  #diocese-wrap {
    display: flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.18);
    border: 2px solid rgba(255,255,255,0.6);
    border-radius: 26px;
    padding: 0 18px 0 14px;
    transition: border-color 0.2s, background 0.2s;
    height: 40px;
  }
  #diocese-wrap:focus-within { border-color: #fff; background: rgba(255,255,255,0.25); }
  #diocese-icon { font-size: 15px; opacity: 0.9; flex-shrink: 0; }
  #diocese-select {
    background: transparent; border: none;
    color: #fff;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px; font-weight: 600;
    padding: 0;
    outline: none; cursor: pointer;
    appearance: none; -webkit-appearance: none;
    min-width: 110px;
  }
  #diocese-select option { background: var(--navy-deep); color: #f5edd8; }

  /* ── 검색 탭 (PC) - 독립 분리 ── */
  #search-wrap {
    display: flex; align-items: center; gap: 0;
    background: rgba(255,255,255,0.18);
    border: 2px solid rgba(255,255,255,0.6);
    border-radius: 26px;
    padding: 0 14px 0 16px;
    transition: border-color 0.2s, background 0.2s;
    height: 40px;
  }
  #search-wrap:focus-within {
    border-color: #fff;
    background: rgba(255,255,255,0.25);
  }
  #search-icon { font-size: 15px; margin-right: 8px; opacity: 0.9; flex-shrink: 0; }
  #search-input {
    background: transparent;
    border: none;
    color: #fff;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px; font-weight: 500;
    padding: 0;
    outline: none; width: 200px;
  }
  #search-input::placeholder { color: rgba(255,255,255,0.65); }
  #search-clear {
    background: none; border: none; cursor: pointer;
    color: rgba(255,255,255,0.75); font-size: 20px; font-weight: 700; line-height: 1;
    padding: 0; margin-left: 4px; display: none;
  }
  #search-clear.visible { display: block; }
  #search-clear:hover { color: #fff; }
  #count-display { font-size: 12px; color: rgba(210,220,248,0.7); margin-left: auto; font-weight: 500; }

  /* 검색 + 경로 묶음 비활성화 (PC에서 분리) */
  #search-route-group {
    display: contents;
  }

  /* ── ROUTE BUTTON (PC) - 독립 분리 ── */
  .route-btn {
    display: flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.18);
    border: 2px solid rgba(255,255,255,0.6);
    border-radius: 26px;
    color: #fff;
    font-size: 14px; font-family: 'Noto Sans KR', sans-serif;
    font-weight: 700;
    padding: 0 20px;
    height: 40px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s, border-color 0.2s;
    white-space: nowrap;
    letter-spacing: 0.02em;
  }
  .route-btn:hover { background: rgba(255,255,255,0.28); border-color: #fff; }
  .route-btn.route-active {
    background: var(--gold);
    border-color: var(--gold-bright);
    color: var(--navy-deep);
  }

  /* ── MOBILE FLOATING SEARCH ── */
  #mobile-search-bar {
    display: none;
    position: absolute;
    top: 10px; left: 10px; right: 10px;
    z-index: 250;
  }
  #mobile-search-inner {
    display: flex; align-items: center; gap: 0;
    background: rgba(14,21,53,0.93);
    border: 1.5px solid rgba(212,170,106,0.6);
    border-radius: 22px;
    padding: 0 8px 0 8px;
    box-shadow: 0 3px 14px rgba(0,0,0,0.3);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    height: 40px;
  }
  #mobile-search-icon { font-size: 14px; margin-right: 7px; opacity: 0.8; flex-shrink: 0; }
  #mobile-search-input {
    flex: 1;
    background: transparent; border: none;
    color: #fff;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px; font-weight: 500;
    padding: 0;
    outline: none;
    min-width: 0;
  }
  #mobile-search-input::placeholder { color: rgba(245,237,216,0.45); }
  #mobile-search-clear {
    background: none; border: none; cursor: pointer;
    color: rgba(212,170,106,0.7); font-size: 17px; line-height: 1;
    padding: 0 2px; display: none; flex-shrink: 0;
  }
  #mobile-search-clear.visible { display: block; }
  #mobile-loc-btn {
    background: none; border: none; cursor: pointer;
    color: rgba(212,170,106,0.85); font-size: 17px; line-height: 1;
    padding: 0 0 0 8px; flex-shrink: 0;
    transition: color 0.2s;
  }
  #mobile-loc-btn:hover { color: var(--gold-bright); }
  #mobile-count {
    font-size: 11px; color: rgba(212,170,106,0.9); font-weight: 700;
    margin-left: 6px; white-space: nowrap;
    background: rgba(212,170,106,0.15);
    border-radius: 10px; padding: 2px 7px;
    flex-shrink: 0;
  }

  /* ── MAIN LAYOUT ── */
  #main { display: flex; flex: 1; overflow: hidden; }

  /* ── SIDEBAR ── */
  #sidebar {
    width: 300px; flex-shrink: 0;
    background: var(--navy-mid);
    border-right: 1px solid rgba(212,170,106,0.15);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  #list-container {
    overflow-y: auto; flex: 1;
    scrollbar-width: thin;
    scrollbar-color: rgba(212,170,106,0.3) transparent;
  }
  #list-container::-webkit-scrollbar { width: 4px; }
  #list-container::-webkit-scrollbar-thumb { background: rgba(212,170,106,0.3); border-radius: 2px; }
  .list-item {
    padding: 12px 16px;
    border-bottom: 1px solid rgba(212,170,106,0.1);
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }
  .list-item:hover { background: rgba(212,170,106,0.08); }
  .list-item.selected { background: rgba(212,170,106,0.15); border-left: 3px solid var(--gold-bright); }
  .item-name {
    font-size: 13px; font-weight: 600;
    color: rgba(245,237,216,0.92);
    line-height: 1.5;
    padding-right: 52px;
  }
  .item-diocese {
    font-size: 11px; color: var(--ink-light); margin-top: 3px;
    padding-right: 52px;
    color: rgba(210,220,248,0.5);
  }
  .item-type {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    font-size: 10px; padding: 3px 8px; border-radius: 10px; font-weight: 600;
  }
  .type-성지 { background: var(--shrine-bg); color: var(--shrine-color); border: 1px solid var(--shrine-border); }
  .type-순례지 { background: var(--pilgrim-bg); color: var(--pilgrim-color); border: 1px solid var(--pilgrim-border); }
  .type-순교사적지 { background: var(--martyr-bg); color: var(--martyr-color); border: 1px solid var(--martyr-border); }
  .diocese-header {
    padding: 8px 16px 5px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
    color: var(--gold-bright);
    background: var(--navy-light);
    border-bottom: 1px solid rgba(212,170,106,0.2);
    position: sticky; top: 0; z-index: 1;
  }

  /* ── MAP ── */
  #map { flex: 1; width: 100%; height: 100%; }

  /* ── INFO PANEL ── */
  #info-panel {
    position: absolute; bottom: 24px; left: 24px;
    width: 300px;
    background: var(--navy-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    display: none;
    z-index: 100;
    box-shadow: 0 4px 24px rgba(14,21,53,0.18);
  }
  #info-panel.visible { display: block; }
  .info-close {
    position: absolute; top: 12px; right: 14px;
    color: var(--ink-light); cursor: pointer; font-size: 18px;
    line-height: 1; background: none; border: none;
  }
  .info-close:hover { color: var(--ink); }
  #info-name {
    font-family: 'Noto Serif KR', serif;
    font-size: 16px; font-weight: 700;
    color: var(--ink);
    line-height: 1.4; margin-bottom: 4px;
    padding-right: 20px;
  }
  #info-diocese {
    font-size: 12px; color: var(--gold);
    margin-bottom: 12px; font-weight: 600;
  }
  .info-row {
    display: flex; gap: 8px;
    font-size: 13px; color: var(--ink);
    margin-bottom: 7px; align-items: flex-start;
    line-height: 1.5;
  }
  .info-row .label {
    color: var(--ink-light); min-width: 36px; flex-shrink: 0;
    font-size: 11px; font-weight: 600; padding-top: 2px;
  }
  #info-link {
    display: inline-block; margin-top: 14px;
    background: var(--navy-mid);
    border: none;
    border-radius: 8px;
    color: #f5edd8;
    font-size: 13px; font-weight: 600; text-decoration: none;
    padding: 10px 16px;
    transition: background 0.2s;
    width: 100%; text-align: center;
  }
  #info-link:hover { background: var(--navy-light); }

  /* ── LEGEND ── */
  #legend {
    position: absolute; bottom: 32px; right: 56px;
    background: rgba(14,21,53,0.92);
    border: 1px solid rgba(212,170,106,0.3);
    border-radius: 10px;
    padding: 10px 14px;
    z-index: 100;
    font-size: 12px;
    color: rgba(245,237,216,0.85);
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }
  .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; font-weight: 500; }
  .legend-item:last-child { margin-bottom: 0; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .legend-dot.성지 { background: var(--shrine-color); }
  .legend-dot.순례지 { background: var(--pilgrim-color); }
  .legend-dot.순교사적지 { background: var(--martyr-color); }

  /* ── ROUTE PANEL ── */
  #route-panel {
    position: absolute; top: 16px; right: 16px;
    width: 320px;
    background: #fff;
    border: none;
    border-radius: 16px;
    padding: 0;
    display: none;
    z-index: 200;
    box-shadow: 0 8px 32px rgba(14,21,53,0.18), 0 2px 8px rgba(0,0,0,0.08);
    overflow: hidden;
  }
  #route-panel.visible { display: block; }
  .route-panel-header {
    background: linear-gradient(135deg, var(--navy-deep) 0%, var(--navy-light) 100%);
    padding: 14px 18px 12px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .route-panel-title {
    font-size: 13px; font-weight: 700;
    color: var(--gold-bright);
    letter-spacing: 0.06em;
  }
  .route-panel-body { padding: 16px 18px; }

  .route-step {
    display: flex; align-items: flex-start; gap: 12px;
    margin-bottom: 0;
  }
  .route-step-icon {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; flex-shrink: 0;
    font-weight: 800; color: #fff;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }
  .step-start { background: linear-gradient(135deg,#1565c0,#1976d2); }
  .step-end   { background: linear-gradient(135deg,#c0392b,#e53935); }
  .route-step-info { flex: 1; min-width: 0; padding-top: 2px; }
  .route-step-label {
    font-size: 10px; color: #999; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 2px;
  }
  .route-step-name  {
    font-size: 14px; font-weight: 700; color: #1a2456;
    line-height: 1.35; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .route-step-sub   { font-size: 11px; color: #888; margin-top: 1px; }

  .route-line-connector {
    display: flex; align-items: center; gap: 10px;
    margin: 8px 0; padding-left: 15px;
  }
  .route-line-dots {
    display: flex; flex-direction: column; gap: 3px; align-items: center;
  }
  .route-dot { width: 4px; height: 4px; border-radius: 50%; background: #ccc; }
  .route-line-label {
    font-size: 11px; color: #aaa; font-style: italic;
  }

  .route-divider { height: 1px; background: #f0f0f0; margin: 14px 0; }

  .route-car-block {
    background: linear-gradient(135deg, #eef4ff 0%, #f0f6ff 100%);
    border: 1px solid #dde8ff;
    border-radius: 12px;
    padding: 14px 16px 12px;
  }
  .route-car-row {
    display: flex; align-items: center;
  }
  .route-car-cell { flex: 1; text-align: center; }
  .route-car-divider {
    width: 1px; height: 38px; background: #dde8ff; margin: 0 10px; flex-shrink: 0;
  }
  .route-car-label {
    font-size: 11px; color: #7a8ab0; font-weight: 600; margin-bottom: 4px;
  }
  .route-car-val {
    font-size: 22px; font-weight: 900; color: #1a2456; line-height: 1.1;
    letter-spacing: -0.5px;
  }
  .route-car-unit { font-size: 13px; font-weight: 500; color: #7a8ab0; margin-left: 2px; }

  .route-cta {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; margin-top: 12px;
    background: linear-gradient(135deg,#1a2456,#243070);
    border: none; border-radius: 10px;
    color: #f5edd8;
    font-size: 13px; font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    padding: 11px;
    cursor: pointer; text-align: center; text-decoration: none;
    transition: opacity 0.2s; box-shadow: 0 2px 8px rgba(26,36,86,0.2);
  }
  .route-cta:hover { opacity: 0.88; }
  .route-reset {
    display: block; width: 100%; margin-top: 7px;
    background: none;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    color: #aaa;
    font-size: 12px; font-family: 'Noto Sans KR', sans-serif;
    padding: 8px; cursor: pointer;
    transition: all 0.2s;
  }
  .route-reset:hover { border-color: #bbb; color: #666; }

  /* Route mode guide tooltip */
  #route-guide {
    position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
    background: rgba(14,21,53,0.9);
    border: 1px solid rgba(212,170,106,0.4);
    border-radius: 30px;
    padding: 8px 20px;
    color: #f5edd8;
    font-size: 13px; font-weight: 600;
    z-index: 300;
    display: none;
    white-space: nowrap;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    pointer-events: none;
  }
  #route-guide.visible { display: block; }

  /* ── 모바일 교구 드롭다운 버튼 ── */
  #mobile-diocese-btn {
    display: flex; align-items: center; gap: 2px;
    background: rgba(212,170,106,0.2);
    border: 1px solid rgba(212,170,106,0.5);
    border-radius: 14px;
    color: rgba(245,237,216,0.95);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 11px; font-weight: 700;
    padding: 4px 8px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  #mobile-diocese-btn.active {
    background: var(--gold);
    border-color: var(--gold-bright);
    color: var(--navy-deep);
  }
  #mobile-diocese-divider {
    width: 1px; height: 18px;
    background: rgba(212,170,106,0.3);
    margin: 0 2px;
    flex-shrink: 0;
  }
  /* 교구 드롭다운 패널 */
  #mobile-diocese-panel {
    display: none;
    position: absolute;
    top: calc(100% + 6px);
    left: 0; right: 0;
    background: rgba(14,21,53,0.97);
    border: 1.5px solid rgba(212,170,106,0.45);
    border-radius: 14px;
    padding: 10px 10px 8px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.4);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    z-index: 400;
  }
  #mobile-diocese-panel.open { display: block; }
  #mobile-diocese-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }
  .m-diocese-item {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(212,170,106,0.3);
    border-radius: 8px;
    color: rgba(245,237,216,0.85);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px; font-weight: 600;
    padding: 9px 4px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .m-diocese-item.active {
    background: var(--gold);
    border-color: var(--gold-bright);
    color: var(--navy-deep);
  }
  .m-diocese-item:not(.active):active {
    background: rgba(212,170,106,0.2);
  }
  /* 기존 .m-chip 유지 (하위호환) */
  .m-chip {
    flex-shrink: 0;
    background: rgba(14,21,53,0.82);
    border: 1px solid rgba(212,170,106,0.4);
    border-radius: 16px;
    color: rgba(245,237,216,0.8);
    font-family: 'Noto Sans KR', sans-serif;

    /* 목록 토글 버튼 및 FAB — 별도 블록에서 관리 */

  }

  /* 모바일 경로 검색 FAB — 성지목록과 동일 스타일 */

    position: fixed;

    border-radius: 24px;

    font-family: 'Noto Sans KR', sans-serif;

  @media (max-width: 768px) {

  }

  /* 모바일 사이드바 핸들 */
  #sidebar-handle {

    text-align: center;
    padding: 8px;

    }

  /* ══ 모바일 하단 탭바 ══════════════════════════════ */
  #mobile-tab-bar {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 56px;

  .tab-btn {

  .tab-btn.active {

  }
  .tab-btn:active { background: rgba(212,170,106,0.15); }

  /* 사이드바 - 모바일 탭 열릴 때 하단에서 슬라이드업 */
  @media (max-width: 768px) {
    #mobile-tab-bar { display: flex; }

    /* 지도 + 콘텐츠 영역이 탭바 높이만큼 줄어듦 */
    #main { padding-bottom: 56px; }

    /* 사이드바 - 하단 시트 */
    #sidebar {
      position: fixed;
      bottom: 56px; left: 0; right: 0;
      width: 100% !important;
      max-height: 65vh;
      border-radius: 16px 16px 0 0;

    #sidebar-handle { display: block; }

    /* 경로 패널 - 하단 시트 */
    #route-panel {
      position: fixed;
      bottom: 56px; left: 0; right: 0;
      width: 100%;
      max-height: 70vh;
      border-radius: 16px 16px 0 0;
      overflow-y: auto;
      box-shadow: 0 -8px 32px rgba(0,0,0,0.3);
      z-index: 400;
    }

    /* 기존 FAB 버튼들 숨김 */
    #list-toggle-btn { display: none !important; }
    #mobile-route-fab { display: none !important; }

    /* 정보 패널 - 하단 시트 위에 */
    #info-panel {
      bottom: 56px;
    }

    /* 레전드 위치 */
    #legend {
      bottom: 66px;
    }
  }

</style>

</div>

<!-- Main -->

function getTypeKey(type) {
  return type.replace(/\s/g,'');
}

function getMarkerColor(type) {
  const t = getTypeKey(type);
  if (t === '성지') return '#c0392b';
  if (t === '순례지') return '#1565c0';
  return '#1b7a3e';
}

let _kakaoAppKey = '';

function loadKakaoMap(key) {
  if (!key) key = '07f7989e29fdfb425fff924f36fb3ec0';
  _kakaoAppKey = key;

  if (document.querySelector('script[data-kakao-map]')) return;

  const script = document.createElement('script');
  script.setAttribute('data-kakao-map', '1');
  // Places 라이브러리 추가
  script.src = `https://dapi.kakao.com/v2/maps/sdk.js?appkey=${key}&libraries=clusterer,services&autoload=false`;
  script.onload = function() {
    kakao.maps.load(function() {
      setTimeout(() => geocodeAllShrines(initMap), 50);
    });
  };
  script.onerror = function() {
    alert('API 키가 올바르지 않거나 도메인이 등록되지 않았습니다.\nKakao Developers에서 웹 플랫폼에 현재 도메인을 등록해주세요.');
  };
  document.head.appendChild(script);
}

/* ── 카카오 키워드 검색으로 전체 성지 좌표 정확히 보정 ─────────── */
async function geocodeAllShrines(callback) {
  const loadingEl = document.createElement('div');
  loadingEl.id = 'geocode-loading';
  loadingEl.style.cssText = [
    'position:fixed;inset:0;z-index:99999',
    'background:linear-gradient(160deg,#0e1535 0%,#1a2456 100%)',
    'display:flex;flex-direction:column;align-items:center;justify-content:center',
    "color:#f5edd8;font-family:'Noto Sans KR',sans-serif"
  ].join(';');
  loadingEl.innerHTML = `
    <div style="font-size:40px;margin-bottom:16px;text-shadow:0 0 30px rgba(212,170,106,.5)">✝</div>
    <div style="font-size:16px;font-weight:700;margin-bottom:6px;">성지 위치를 확인하는 중...</div>
    <div id="gc-prog" style="font-size:12px;color:rgba(212,170,106,.85);margin-bottom:20px;">0 / ${SHRINES.length}</div>
    <div style="width:260px;height:6px;background:rgba(255,255,255,.12);border-radius:3px;overflow:hidden">
      <div id="gc-bar" style="height:100%;width:0%;background:linear-gradient(90deg,#b8965a,#d4aa6a);border-radius:3px;transition:width .2s"></div>
    </div>
    <div style="font-size:11px;color:rgba(255,255,255,.35);margin-top:14px;">카카오맵 검색어 기준으로 마커 위치를 설정합니다</div>
  `;
  document.body.appendChild(loadingEl);

  const REST_KEY = '86a3b86e6c1b0210b8e4aba5f6c83b00';
  const total = SHRINES.length;
  let done = 0;

  function updateProgress() {
    done++;
    const pct = Math.round(done / total * 100);
    const bar = document.getElementById('gc-bar');
    const prog = document.getElementById('gc-prog');
    if (bar) bar.style.width = pct + '%';
    if (prog) prog.textContent = done + ' / ' + total;
  }

  // 카카오 REST API 키워드 검색 (CORS 허용됨)
  async function searchKw(kw) {
    try {
      const url = `https://dapi.kakao.com/v2/local/search/keyword.json?query=${encodeURIComponent(kw)}&size=1`;
      const res = await fetch(url, {
        headers: { 'Authorization': 'KakaoAK ' + REST_KEY }
      });
      if (!res.ok) return null;
      const data = await res.json();
      if (data.documents && data.documents.length > 0) {
        return { lat: parseFloat(data.documents[0].y), lng: parseFloat(data.documents[0].x) };
      }
    } catch(e) {}
    return null;
  }

  // 5개씩 병렬 처리 (API 과부하 방지)
  const BATCH = 5;
  for (let i = 0; i < SHRINES.length; i += BATCH) {
    const batch = SHRINES.slice(i, i + BATCH);
    await Promise.all(batch.map(async shrine => {
      const result = await searchKw(shrine.kw || shrine.name);
      if (result) {
        shrine.lat = result.lat;
        shrine.lng = result.lng;
      }
      updateProgress();
    }));
    // 배치 간 딜레이 (레이트 리밋 방지)
    if (i + BATCH < SHRINES.length) await new Promise(r => setTimeout(r, 120));
  }

  loadingEl.remove();
  callback();
}

function initMap() {
  const container = document.getElementById('map');
  const options = {
    center: new kakao.maps.LatLng(35.87, 128.60),
    level: 8
  };
  map = new kakao.maps.Map(container, options);

  // 줌 컨트롤
  const zoomControl = new kakao.maps.ZoomControl();
  map.addControl(zoomControl, kakao.maps.ControlPosition.RIGHT);

  createMarkers(); // REST API geocoding 완료 후 renderList 자동 호출

function createMarkerImage(color, big) {
  const w = big ? 40 : 28;
  const h = big ? 52 : 36;
  const svg = big
    ? `<svg xmlns="http://www.w3.org/2000/svg" width="40" height="52" viewBox="0 0 40 52">
        <path d="M20 0C8.954 0 0 8.954 0 20c0 14.21 20 32 20 32S40 34.21 40 20C40 8.954 31.046 0 20 0z" fill="${color}"/>
        <circle cx="20" cy="20" r="9" fill="white" opacity="0.95"/>
        <text x="20" y="25" text-anchor="middle" font-size="13" fill="${color}" font-family="serif" font-weight="bold">✝</text>
      </svg>`
    : `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 28 36">
        <path d="M14 0C6.268 0 0 6.268 0 14c0 9.941 14 22 14 22S28 23.941 28 14C28 6.268 21.732 0 14 0z" fill="${color}" opacity="0.9"/>
        <circle cx="14" cy="14" r="6" fill="white" opacity="0.9"/>
        <text x="14" y="18" text-anchor="middle" font-size="9" fill="${color}" font-family="serif" font-weight="bold">✝</text>
      </svg>`;

  return new kakao.maps.MarkerImage(
    'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg),
    new kakao.maps.Size(w, h),
    { offset: new kakao.maps.Point(w/2, h) }
  );
}

function selectMarker(idx) {

  if (selectedMarkerIdx >= 0 && markers[selectedMarkerIdx]) {
    const prev = markers[selectedMarkerIdx];
    prev.marker.setImage(createMarkerImage(getMarkerColor(prev.shrine.type), false));
    prev.marker.setZIndex(1);
  }
  // 새 마커 크게 + 금색 강조 (SHRINES index와 1:1 대응이므로 항상 정확)
  if (idx >= 0 && markers[idx]) {

    cur.marker.setImage(createMarkerImage('#d4aa00', true));
    cur.marker.setZIndex(10);
  }
  selectedMarkerIdx = idx;
}

function createMarkers() {
  // 기존 마커 제거
  markers.forEach(m => { if (m) m.marker.setMap(null); });
  markers = new Array(SHRINES.length).fill(null); // SHRINES와 1:1 index 대응

  SHRINES.forEach((s, i) => {
    if (!s.lat || !s.lng) return;
    const pos = new kakao.maps.LatLng(s.lat, s.lng);
    const marker = new kakao.maps.Marker({
      position: pos,
      image: createMarkerImage(getMarkerColor(s.type), false),
      title: s.name
    });
    kakao.maps.event.addListener(marker, 'click', function() {
      if (routeMode) { selectRouteShrine(i); return; }
      selectMarker(i);
      showInfo(i);
      highlightList(i);
      smoothMoveTo(s.lat, s.lng);
    });
    markers[i] = { marker, shrine: s, index: i };
  });

  updateMarkers();
  renderList();
}

// 부드러운 지도 이동 (카카오맵 panTo + 커스텀 ease)
function smoothMoveTo(lat, lng) {
  const dest = new kakao.maps.LatLng(lat, lng);
  const cur = map.getCenter();
  const startLat = cur.getLat();
  const startLng = cur.getLng();
  const destLat = dest.getLat();
  const destLng = dest.getLng();
  const duration = 600;
  const start = performance.now();

  function ease(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }

  function step(now) {
    const elapsed = now - start;
    const t = Math.min(elapsed / duration, 1);
    const e = ease(t);
    const lat = startLat + (destLat - startLat) * e;
    const lng = startLng + (destLng - startLng) * e;
    map.setCenter(new kakao.maps.LatLng(lat, lng));
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function updateMarkers() {
  let count = 0;
  markers.forEach(m => {
    if (!m) return;
    const s = m.shrine;
    const dioceseMatch = currentDiocese === 'all' || s.diocese === currentDiocese;
    const searchMatch  = !currentSearch ||
      s.name.includes(currentSearch) ||
      s.diocese.includes(currentSearch) ||
      s.addr.includes(currentSearch);
    const visible = dioceseMatch && searchMatch;
    m.marker.setMap(visible ? map : null);
    if (visible) count++;
  });
  document.getElementById('count-display').textContent = count === SHRINES.length ? `${count}개소` : `${count} / ${SHRINES.length}개소`;
  const mc = document.getElementById('mobile-count');
  if (mc) mc.textContent = count === SHRINES.length ? `${count}개소` : `${count}/${SHRINES.length}`;
}

function renderList() {
  const container = document.getElementById('list-container');
  container.innerHTML = '';

  const dioceses = {};
  markers.forEach(m => {
    if (!m) return; // null 슬롯 (좌표 미확정 항목) 건너뜀
    const s = m.shrine;
    const dioceseMatch = currentDiocese === 'all' || s.diocese === currentDiocese;
    const searchMatch  = !currentSearch ||
      s.name.includes(currentSearch) ||
      s.diocese.includes(currentSearch) ||
      s.addr.includes(currentSearch);
    if (dioceseMatch && searchMatch) {
      if (!dioceses[s.diocese]) dioceses[s.diocese] = [];
      dioceses[s.diocese].push({ s, i: m.index });
    }
  });

  Object.entries(dioceses).forEach(([diocese, items]) => {
    const header = document.createElement('div');
    header.className = 'diocese-header';
    header.textContent = diocese;
    container.appendChild(header);

    items.forEach(({ s, i }) => {
      const div = document.createElement('div');

      div.id = `list-item-${i}`;

        selectMarker(i);

}

function locateNearest() {
  const btn = document.getElementById('mobile-loc-btn');
  if (!navigator.geolocation) {
    alert('위치 정보를 지원하지 않는 브라우저입니다.');
    return;
  }
  btn.textContent = '⏳';
  navigator.geolocation.getCurrentPosition(
    pos => {
      btn.textContent = '📍';
      const myLat = pos.coords.latitude;
      const myLng = pos.coords.longitude;

      // 내 위치 마커 표시
      if (window._myLocMarker) window._myLocMarker.setMap(null);
      const myPos = new kakao.maps.LatLng(myLat, myLng);
      window._myLocMarker = new kakao.maps.Marker({
        position: myPos,
        title: '내 위치',
        image: new kakao.maps.MarkerImage(
          'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(
            `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10" fill="#1a73e8" opacity="0.2"/>
              <circle cx="12" cy="12" r="6" fill="#1a73e8"/>
              <circle cx="12" cy="12" r="3" fill="white"/>
            </svg>`
          ),
          new kakao.maps.Size(24, 24),
          { offset: new kakao.maps.Point(12, 12) }
        )
      });
      window._myLocMarker.setMap(map);

      // 가장 가까운 성지 5개 찾기
      const visible = markers.filter(m => m.marker.getMap());
      const sorted = visible.map(m => ({
        m, dist: haversineKm(myLat, myLng, m.shrine.lat, m.shrine.lng)
      })).sort((a, b) => a.dist - b.dist);

      const nearest = sorted[0];
      if (nearest) {
        map.setCenter(new kakao.maps.LatLng(myLat, myLng));
        map.setLevel(7);
        // 가장 가까운 성지 하이라이트
        setTimeout(() => {
          selectMarker(nearest.m.index);
          showInfo(nearest.m.index);
          highlightList(nearest.m.index);
        }, 300);
      }
    },
    err => {
      btn.textContent = '📍';
      alert('위치를 가져올 수 없습니다.\n위치 접근 권한을 허용해 주세요.');
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

async function fetchRoadInfo(s1, s2) {
  const REST_KEY = '86a3b86e6c1b0210b8e4aba5f6c83b00';
  try {
    const url = `https://apis-navi.kakaomobility.com/v1/directions` +
      `?origin=${s1.lng},${s1.lat}` +
      `&destination=${s2.lng},${s2.lat}` +
      `&priority=RECOMMEND`;
    const res = await fetch(url, {
      headers: {
        'Authorization': `KakaoAK ${REST_KEY}`,
        'Content-Type': 'application/json'
      }
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const route = data.routes?.[0];
    if (!route || route.result_code !== 0) {
      console.warn('카카오 모빌리티 응답 오류:', data);
      throw new Error('no route: ' + route?.result_msg);
    }
    const summary = route.summary;

    // 도로 꼭짓점(vertexes) 추출 → 실제 도로 경로
    const path = [];
    for (const section of (route.sections || [])) {
      for (const road of (section.roads || [])) {
        const vx = road.vertexes; // [lng1, lat1, lng2, lat2, ...]
        for (let i = 0; i < vx.length - 1; i += 2) {
          path.push(new kakao.maps.LatLng(vx[i + 1], vx[i]));
        }
      }
    }

    return {
      roadKm:    summary.distance / 1000,
      carSec:    summary.duration,
      path:      path.length > 1 ? path : null,
      estimated: false
    };
  } catch(e) {
    console.warn('카카오 모빌리티 API 오류, 추정값으로 대체:', e.message);
    const distKm = haversineKm(s1.lat, s1.lng, s2.lat, s2.lng);
    // 현위치 출발인 경우 s1.lat/lng 사용
    const d1lat = s1.lat || (window._myLocForRoute?.lat) || s1.lat;
    const d1lng = s1.lng || (window._myLocForRoute?.lng) || s1.lng;
    return {
      roadKm:    distKm * 1.4,
      carSec:    (distKm * 1.4 / 70) * 3600,
      path:      null,
      estimated: true,
      noRoad:    e.message && e.message.includes('no route')
    };
  }
}

function buildKakaoUrl(s1, s2) {
  // s1이 현위치인 경우 to만 사용 (카카오맵이 현위치에서 출발)
  if (s1.name === '현위치') {
    const to = `${encodeURIComponent(s2.name)},${s2.lat},${s2.lng}`;
    return `https://map.kakao.com/link/to/${to}`;
  }
  const from = `${encodeURIComponent(s1.name)},${s1.lat},${s1.lng}`;
  const to   = `${encodeURIComponent(s2.name)},${s2.lat},${s2.lng}`;
  return `https://map.kakao.com/link/from/${from}/to/${to}`;
}

function haversineKm(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLng/2)**2;
  return R * 2 * Math.asin(Math.sqrt(a));
}

function formatTime(seconds) {
  if (!seconds || seconds < 60) return '1분 미만';
  const totalMin = Math.round(seconds / 60);
  if (totalMin < 60) return totalMin + '분';
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  return m > 0 ? `${h}시간 ${m}분` : `${h}시간`;
}

function drawRouteLine(s1, s2, roadPath) {
  if (routePolyline) routePolyline.setMap(null);

  const fallbackPath = [
    new kakao.maps.LatLng(s1.lat, s1.lng),
    new kakao.maps.LatLng(s2.lat, s2.lng)
  ];

  const usePath = (roadPath && roadPath.length > 1) ? roadPath : fallbackPath;
  const isEstimated = !(roadPath && roadPath.length > 1);

  routePolyline = new kakao.maps.Polyline({
    path: usePath,
    strokeWeight:  isEstimated ? 3 : 6,
    strokeColor:   isEstimated ? '#b8965a' : '#1a73e8',
    strokeOpacity: isEstimated ? 0.75 : 0.9,
    strokeStyle:   isEstimated ? 'dashed' : 'solid'
  });
  routePolyline.setMap(map);

  // 두 마커가 모두 보이도록 지도 범위 조정
  const bounds = new kakao.maps.LatLngBounds();
  usePath.forEach(p => bounds.extend(p));
  map.setBounds(bounds, 80);
}

function restoreMarker(routeObj) {
  if (!routeObj) return;
  if (routeObj.idx < 0) return; // 현위치는 마커 복원 불필요
  markers[routeObj.idx].marker.setImage(
    createMarkerImage(getMarkerColor(routeObj.shrine.type), false)
  );
}

function selectRouteShrine(idx) {
  if (!routeMode) return;
  const s = SHRINES[idx];
  const guide = document.getElementById('route-guide');

  // 어느 상태에서든 클릭한 성지의 상세 배너 표시
  showInfo(idx);

  /* ── 경로 선택 상태 처리 ── */

  // 출발·도착 모두 선택된 상태 → 완전 초기화 후 새 출발로
  if (routeStart && routeEnd) {
    restoreMarker(routeStart);
    restoreMarker(routeEnd);
    if (routePolyline) { routePolyline.setMap(null); routePolyline = null; }
    routeStart = null;
    routeEnd   = null;
    _clearPanelValues();
  }

  // 출발 미선택 → 새 출발로 설정
  if (!routeStart) {
    routeStart = { idx, shrine: s };
    markers[idx].marker.setImage(createRouteMarkerImage(getTypeKey(s.type), '출'));
    const isMob = window.innerWidth <= 768;
    guide.textContent = isMob ? '📍 도착 성지를 터치하세요' : '도착 성지를 클릭하세요';
    guide.classList.add('visible');
    return;
  }

  // 이미 선택된 출발을 다시 클릭 → 출발 취소
  if (routeStart.idx === idx) {
    restoreMarker(routeStart);
    routeStart = null;
    const isMob = window.innerWidth <= 768;
    guide.textContent = isMob ? '📍 출발 성지를 터치하세요' : '출발 성지를 클릭하세요';
    return;
  }

  // 도착 선택
  routeEnd = { idx, shrine: s };
  markers[idx].marker.setImage(createRouteMarkerImage(getTypeKey(s.type), '도'));
  guide.classList.remove('visible');

  // 경로 패널 표시 (로딩 중)
  document.getElementById('route-start-name').textContent    = routeStart.shrine.name;
  document.getElementById('route-start-diocese').textContent = routeStart.shrine.diocese;
  document.getElementById('route-end-name').textContent      = s.name;
  document.getElementById('route-end-diocese').textContent   = s.diocese;
  document.getElementById('route-distance').textContent      = '…';
  document.getElementById('route-car').textContent           = '…';
  document.getElementById('route-estimated-note').style.display = 'none';
  document.getElementById('route-kakao-link').href = buildKakaoUrl(routeStart.shrine, s);
  document.getElementById('route-panel').classList.add('visible');

  // ── 모바일: 출발·도착 확정 시 카카오맵 자동 열기 ──
  const isMobile = window.innerWidth <= 768;
  if (isMobile) {
    const kakaoUrl = buildKakaoUrl(routeStart.shrine, s);
    // 잠깐 딜레이 후 열기 (사용자가 선택 확인 가능하도록)
    setTimeout(() => {
      window.open(kakaoUrl, '_blank');
    }, 600);
  }

  // 임시 직선으로 먼저 표시
  // 현위치 출발 시 _myLocForRoute 좌표 사용
  const startShrine = routeStart.idx < 0 && _myLocForRoute
    ? { ...routeStart.shrine, lat: _myLocForRoute.lat, lng: _myLocForRoute.lng }
    : routeStart.shrine;
  drawRouteLine(startShrine, s, null);

  // 카카오 모빌리티로 실제 도로 경로 가져오기
  fetchRoadInfo(startShrine, s).then(info => {
    document.getElementById('route-distance').textContent = info.roadKm ? info.roadKm.toFixed(1) : '—';
    document.getElementById('route-car').textContent      = info.noRoad ? '경로 없음' : formatTime(info.carSec);
    const noteEl = document.getElementById('route-estimated-note');
    if (info.noRoad) {
      noteEl.textContent = '⛰ 자동차 진입 불가 구간 — 진입 가능한 가장 가까운 도로까지의 거리 기준';
      noteEl.style.display = 'block';
    } else if (info.estimated) {
      noteEl.textContent = '* 네트워크 오류 — 직선거리 기반 추정값';
      noteEl.style.display = 'block';
    } else {
      noteEl.style.display = 'none';
    }
    // 실제 도로 경로로 폴리라인 업데이트
    drawRouteLine(routeStart.shrine, s, info.path);
  });
}


/* ── 현위치 출발 경로 ──────────────────────────── */
let _myLocForRoute = null;

function useMyLocationAsStart() {
  if (!routeMode) {
    // 경로 모드 진입
    routeMode = true;
    const btn = document.getElementById('route-mode-btn');
    const fab = document.getElementById('mobile-route-fab');
    const guide = document.getElementById('route-guide');
    if (btn) { btn.classList.add('route-active'); document.getElementById('route-btn-text').textContent = '경로 종료'; }
    if (fab) { fab.innerHTML = '✕ 경로 종료'; fab.classList.add('route-active'); }
    document.body.classList.add('route-active');
    guide.classList.add('visible');
  }

  // 현재 위치 가져오기
  if (!navigator.geolocation) { alert('위치 정보를 지원하지 않습니다.'); return; }
  const btn = document.getElementById('use-my-loc-btn');
  btn.innerHTML = '⏳ 위치 확인 중...';

  navigator.geolocation.getCurrentPosition(pos => {
    btn.innerHTML = '📍 현위치에서 출발';
    _myLocForRoute = { lat: pos.coords.latitude, lng: pos.coords.longitude };

    // 이전 출발 복원
    if (routeStart) restoreMarker(routeStart);
    routeStart = { idx: -1, shrine: { name:'현위치', diocese:'', lat:_myLocForRoute.lat, lng:_myLocForRoute.lng } };

    // 내 위치 마커 갱신
    if (window._myLocMarker) window._myLocMarker.setMap(null);
    const myPos = new kakao.maps.LatLng(_myLocForRoute.lat, _myLocForRoute.lng);
    window._myLocMarker = new kakao.maps.Marker({
      position: myPos, title:'현위치',
      image: new kakao.maps.MarkerImage(
        'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(
          '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">' +
          '<circle cx="16" cy="16" r="14" fill="#1a73e8" opacity="0.2"/>' +
          '<circle cx="16" cy="16" r="8" fill="#1a73e8"/>' +
          '<circle cx="16" cy="16" r="4" fill="white"/>' +
          '</svg>'
        ),
        new kakao.maps.Size(32,32), {offset: new kakao.maps.Point(16,16)}
      )
    });
    window._myLocMarker.setMap(map);

    // 패널에 현위치 표시
    document.getElementById('route-start-name').textContent = '📍 현위치';
    document.getElementById('route-start-diocese').textContent = '내 현재 위치';
    document.getElementById('route-panel').classList.add('visible');

    const guide = document.getElementById('route-guide');
    const isMob = window.innerWidth <= 768;
    guide.textContent = isMob ? '📍 도착 성지를 터치하세요' : '도착 성지를 클릭하세요';
    guide.classList.add('visible');

    map.setCenter(myPos);
    map.setLevel(8);
  }, () => {
    btn.innerHTML = '📍 현위치에서 출발';
    alert('위치를 가져올 수 없습니다.\n위치 접근 권한을 허용해 주세요.');
  }, { enableHighAccuracy:true, timeout:10000 });
}


/* ── 정보 패널에서 경로 설정 ────────────────────── */
function setRouteFromInfo(role) {
  const idx = selectedIdx;
  if (idx < 0) return;
  const s = SHRINES[idx];

  // 경로 모드 진입
  if (!routeMode) {
    routeMode = true;
    const btn  = document.getElementById('route-mode-btn');
    const fab  = document.getElementById('mobile-route-fab');
    const guide= document.getElementById('route-guide');
    if (btn)  { btn.classList.add('route-active'); document.getElementById('route-btn-text').textContent='경로 종료'; }
    if (fab)  { fab.innerHTML='✕ 경로 종료'; fab.classList.add('route-active'); }
    document.body.classList.add('route-active');
    guide.classList.add('visible');
  }

  if (role === 'start') {
    if (routeStart) restoreMarker(routeStart);
    routeStart = { idx, shrine: s };
    markers[idx].marker.setImage(createRouteMarkerImage(getTypeKey(s.type), '출'));
    document.getElementById('route-panel').classList.add('visible');
    document.getElementById('route-start-name').textContent = s.name;
    document.getElementById('route-start-diocese').textContent = s.diocese;
    const guide = document.getElementById('route-guide');
    guide.textContent = window.innerWidth <= 768 ? '📍 도착 성지를 터치하세요' : '도착 성지를 클릭하세요';
    guide.classList.add('visible');
    // 도착이 이미 선택됐으면 경로 계산
    if (routeEnd) _calcRoute();
  } else {
    if (routeEnd) restoreMarker(routeEnd);
    routeEnd = { idx, shrine: s };
    markers[idx].marker.setImage(createRouteMarkerImage(getTypeKey(s.type), '도'));
    document.getElementById('route-panel').classList.add('visible');
    document.getElementById('route-end-name').textContent = s.name;
    document.getElementById('route-end-diocese').textContent = s.diocese;
    document.getElementById('route-guide').classList.remove('visible');
    // 출발이 이미 선택됐으면 경로 계산
    if (routeStart) _calcRoute();
    else {
      document.getElementById('route-guide').textContent = window.innerWidth <= 768 ? '📍 출발 성지를 터치하세요' : '출발 성지를 클릭하세요';
      document.getElementById('route-guide').classList.add('visible');
    }
  }
}

function _calcRoute() {
  if (!routeStart || !routeEnd) return;
  const s = routeEnd.shrine;
  document.getElementById('route-distance').textContent = '…';
  document.getElementById('route-car').textContent = '…';
  document.getElementById('route-estimated-note').style.display = 'none';
  document.getElementById('route-kakao-link').href = buildKakaoUrl(routeStart.shrine, s);
  document.getElementById('route-guide').classList.remove('visible');

  const startShrine = routeStart.idx < 0 && _myLocForRoute
    ? { ...routeStart.shrine, lat: _myLocForRoute.lat, lng: _myLocForRoute.lng }
    : routeStart.shrine;

  drawRouteLine(startShrine, s, null);
  fetchRoadInfo(startShrine, s).then(info => {
    document.getElementById('route-distance').textContent = info.roadKm ? info.roadKm.toFixed(1) : '—';
    document.getElementById('route-car').textContent = info.noRoad ? '경로 없음' : formatTime(info.carSec);
    const noteEl = document.getElementById('route-estimated-note');
    if (info.noRoad) {
      noteEl.textContent = '⛰ 자동차 진입 불가 — 접근 가능한 도로까지의 거리 기준';
      noteEl.style.display = 'block';
    } else if (info.estimated) {
      noteEl.textContent = '* 직선거리 기반 추정값';
      noteEl.style.display = 'block';
    } else {
      noteEl.style.display = 'none';
    }
    drawRouteLine(startShrine, s, info.path);
  });

  // 모바일 자동 카카오맵 열기
  if (window.innerWidth <= 768) {
    setTimeout(() => window.open(buildKakaoUrl(routeStart.shrine, s), '_blank'), 600);
  }
}


/* ── 모바일 하단 탭 전환 ──────────────────────────── */
let _currentTab = 'map';

function switchTab(tab) {
  _currentTab = tab;

  // 탭 버튼 active 상태
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('tab-' + tab);
  if (btn) btn.classList.add('active');

  const sidebar  = document.getElementById('sidebar');
  const routePanel = document.getElementById('route-panel');

  if (tab === 'map') {
    // 지도: 사이드바 + 경로패널 닫기
    if (sidebar) sidebar.classList.remove('mobile-open');
    if (routePanel) routePanel.classList.remove('visible');
    // 경로 모드이면 종료
    if (routeMode) toggleRouteMode();

  } else if (tab === 'list') {
    // 성지목록: 사이드바 열기, 경로패널 닫기
    if (sidebar) sidebar.classList.add('mobile-open');
    if (routePanel) routePanel.classList.remove('visible');
    // 경로 모드이면 종료
    if (routeMode) toggleRouteMode();

  } else if (tab === 'route') {
    // 경로검색: 경로 모드 진입, 사이드바 닫기
    if (sidebar) sidebar.classList.remove('mobile-open');
    if (!routeMode) {
      // toggleRouteMode 내부 로직 직접 실행 (탭 상태 유지)
      routeMode = true;
      const fab  = document.getElementById('mobile-route-fab');
      const guide = document.getElementById('route-guide');
      const isMob = true;
      closeInfo();
      const routeBtn = document.getElementById('route-mode-btn');
      if (routeBtn) { routeBtn.classList.add('route-active'); document.getElementById('route-btn-text').textContent='경로 종료'; }
      document.body.classList.add('route-active');
      guide.textContent = '📍 출발 성지를 터치하세요';
      guide.classList.add('visible');
      // 경로 패널 표시
      document.getElementById('route-panel').classList.add('visible');
    }
  }
}

/* 탭 상태 동기화 - 경로 종료 시 탭을 지도로 */
function _syncTabOnRouteEnd() {
  if (window.innerWidth <= 768) {
    _currentTab = 'map';
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    const mapBtn = document.getElementById('tab-map');
    if (mapBtn) mapBtn.classList.add('active');
    const sidebar = document.getElementById('sidebar');
    if (sidebar) sidebar.classList.remove('mobile-open');
  }
}

/* 목록에서 성지 선택 시 지도 탭으로 전환 */
function _switchToMapTab() {
  if (window.innerWidth <= 768) {
    switchTab('map');
  }
}

function _clearPanelValues() {
  document.getElementById('route-start-name').textContent    = '—';
  document.getElementById('route-start-diocese').textContent = '';
  document.getElementById('route-end-name').textContent      = '—';
  document.getElementById('route-end-diocese').textContent   = '';
  document.getElementById('route-distance').textContent      = '—';
  document.getElementById('route-car').textContent           = '—';
  document.getElementById('route-estimated-note').style.display = 'none';
  document.getElementById('route-kakao-link').href           = '#';
}

function resetRoute(keepMode) {
  // 마커 원상 복원 (먼저 ref 저장 후 null 처리)
  const prevStart = routeStart;
  const prevEnd   = routeEnd;
  routeStart = null;
  routeEnd   = null;

  restoreMarker(prevStart);
  restoreMarker(prevEnd);

  if (routePolyline) { routePolyline.setMap(null); routePolyline = null; }

  if (keepMode) {
    // 경로 종료 버튼 → 패널 닫기
    document.getElementById('route-panel').classList.remove('visible');
    _syncTabOnRouteEnd(); // 모바일 탭 동기화
  } else {
    // "다시 선택" 버튼 → 패널 유지, 값만 초기화, 가이드 재표시
    _clearPanelValues();
    if (routeMode) {
      const guide = document.getElementById('route-guide');
      guide.textContent = '출발 성지를 클릭하세요';
      guide.classList.add('visible');
    }
  }
}

function createRouteMarkerImage(typeKey, label) {
  const colorMap = { '성지': '#c0392b', '순례지': '#1565c0', '순교사적지': '#1b7a3e' };
  const color = colorMap[typeKey] || '#c0392b';

  const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='36' height='46' viewBox='0 0 36 46'>
    <ellipse cx='18' cy='43' rx='8' ry='3' fill='rgba(0,0,0,0.25)'/>
    <path d='M18 2 C9 2 2 9 2 18 C2 28 18 42 18 42 C18 42 34 28 34 18 C34 9 27 2 18 2Z' fill='${color}' stroke='white' stroke-width='2.5'/>
    <circle cx='18' cy='18' r='10' fill='white' opacity='0.9'/>
    <text x='18' y='23' font-size='13' font-weight='900' fill='${color}' text-anchor='middle' font-family='Arial,sans-serif'>${label}</text>
  </svg>`;
  return new kakao.maps.MarkerImage(
    'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg),
    new kakao.maps.Size(36, 46),
    { offset: new kakao.maps.Point(18, 44) }
  );
}

      Safari 하단 <b>공유버튼 → 홈 화면에 추가</b>를 눌러주세요
    </div>
    <div style="font-size:11px;color:rgba(210,220,248,0.6);">앱처럼 바로 사용할 수 있습니다</div>
  </div>
  <button id="pwa-install-btn" onclick="installPWA()" style="
    background:var(--gold); color:var(--navy-deep); border:none; border-radius:8px;
    padding:8px 16px; font-size:13px; font-weight:700; cursor:pointer;
    font-family:'Noto Sans KR',sans-serif;
  ">설치</button>
  <button onclick="closePWABanner()" style="
    background:none; border:none; font-size:20px; color:rgba(212,170,106,0.6);
    cursor:pointer; padding:0 4px; line-height:1;
  ">×</button>
</div>
