<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 주변 성당 찾기</title>
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=8a7afa006d8404881c3331ccf068a2ef&libraries=services"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; margin: 0; padding: 0; background-color: #f4f4f9; }
        header { background: #2c3e50; color: white; padding: 20px; text-align: center; position: sticky; top: 0; z-index: 100; }
        #church-results { padding: 10px; }
        .item { background: white; border-radius: 8px; margin-bottom: 12px; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .name { font-size: 1.2rem; font-weight: bold; color: #333; display: flex; justify-content: space-between; }
        .dist { color: #e74c3c; font-size: 0.9rem; }
        .info { color: #666; font-size: 0.85rem; margin: 8px 0; line-height: 1.4; }
        .btn-group { display: flex; gap: 5px; margin-top: 10px; }
        button { flex: 1; padding: 10px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 0.8rem; }
        .btn-home { background: #3498db; color: white; }
        .btn-map { background: #f1c40f; color: black; }
        .btn-call { background: #2ecc71; color: white; }
    </style>
</head>
<body>

    <header>
        <h2>⛪ 내 주변 성당 찾기</h2>
        <p style="font-size: 0.8rem; margin:0;">가까운 10곳을 추천해 드립니다</p>
    </header>

    <div id="church-results">
        <p style="text-align:center; padding: 20px;">현 위치를 파악 중입니다...</p>
    </div>

<script>
// 1. 엑셀 수집 데이터 (위치 파악을 위해 위도/경도가 있으면 좋지만 없어도 주소로 계산 가능합니다)
const churchData = [
    { name: "가실성당", addr: "경상북도 칠곡군 왜관읍 가실1길 1", url: "https://www.daegu-archdiocese.or.kr/page/area.html?srl=church_search&menu=c4&number=28&y_id=091&premenu=c1", tel: "054-976-1102" },
    { name: "가창성당", addr: "대구광역시 달성군 가창면 가창로 1118", url: "https://www.daegu-archdiocese.or.kr/page/area.html?srl=church_search&menu=c4&number=7&y_id=112&premenu=c1", tel: "053-767-2311" },
    { name: "계산성당", addr: "대구광역시 중구 서성로 10", url: "https://www.daegu-archdiocese.or.kr/page/area.html?srl=church_search&menu=c4&number=1&y_id=001&premenu=c1", tel: "053-254-2300" },
    { name: "고성성당", addr: "대구광역시 북구 옥산로 112", url: "https://www.daegu-archdiocese.or.kr/page/area.html?srl=church_search&menu=c4&number=2&y_id=002&premenu=c1", tel: "053-353-2311" },
    { name: "월배성당", addr: "대구광역시 달서구 상원로 105", url: "https://www.daegu-archdiocese.or.kr/page/area.html?srl=church_search&menu=c4&word=월배", tel: "053-631-2311" }
    // 여기에 164개 데이터를 같은 형식으로 추가하면 됩니다.
];

const geocoder = new kakao.maps.services.Geocoder();

// 2. 현재 위치 가져오기
navigator.geolocation.getCurrentPosition((pos) => {
    const userLat = pos.coords.latitude;
    const userLng = pos.coords.longitude;
    calculateDistances(userLat, userLng);
}, () => {
    alert("위치 정보를 허용해 주세요.");
});

function calculateDistances(uLat, uLng) {
    let processedCount = 0;
    let results = [];

    churchData.forEach(church => {
        geocoder.addressSearch(church.addr, (result, status) => {
            if (status === kakao.maps.services.Status.OK) {
                const dist = getDistance(uLat, uLng, result[0].y, result[0].x);
                results.push({ ...church, dist, lat: result[0].y, lng: result[0].x });
            }
            processedCount++;
            if (processedCount === churchData.length) {
                // 3. 거리순 정렬 후 상위 10개 출력
                renderList(results.sort((a, b) => a.dist - b.dist).slice(0, 10));
            }
        });
    });
}

function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function renderList(list) {
    const container = document.getElementById('church-results');
    container.innerHTML = '';
    list.forEach(item => {
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `
            <div class="name">${item.name} <span class="dist">${item.dist.toFixed(1)}km</span></div>
            <div class="info">${item.addr}</div>
            <div class="btn-group">
                <button class="btn-home" onclick="window.open('${item.url}')">미사시간/상세</button>
                <button class="btn-map" onclick="goNavi('${item.name}', ${item.lat}, ${item.lng})">카카오 길안내</button>
                <button class="btn-call" onclick="location.href='tel:${item.tel}'">전화하기</button>
            </div>
        `;
        container.appendChild(div);
    });
}

function goNavi(name, lat, lng) {
    const url = `kakaomap://route?ep=${lat},${lng}&by=CAR`;
    location.href = url;
    setTimeout(() => { window.open(`https://map.kakao.com/link/to/${name},${lat},${lng}`); }, 500);
}
</script>
</body>
</html>
