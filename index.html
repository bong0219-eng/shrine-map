<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>가톨릭 웹</title>
<style>
/* ══ 기존 앱 색상 시스템과 통일 ══ */
:root {
  --d:     #C42B2B;
  --d-lt:  #FDF0F0;
  --bg:    #F5F3EE;
  --card:  #FEFEFE;
  --bdr:   #E4DDD6;
  --tx:    #252018;
  --sub:   #706858;
  --dim:   #B8ADA0;
  --r:     13px;
 
  /* 카테고리별 색상 */
  --cat-center:  #8B1C2A;  /* 중앙기구 */
  --cat-portal:  #1A6B3C;  /* 신앙포털 */
  --cat-media:   #1A4F8B;  /* 미디어/방송 */
  --cat-press:   #5A3E8B;  /* 언론 */
  --cat-pub:     #7A5230;  /* 출판 */
  --cat-spirit:  #2E7A7A;  /* 영성 */
  --cat-pilgrim: #7A6A1A;  /* 순례/역사 */
  --cat-diocese: #4A4A4A;  /* 교구 */
}
 
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  background:#C0B8B0;
  display:flex;align-items:center;justify-content:center;
}
@media(min-width:600px){
  body{background:#B8B0A8;}
}
 
/* ══ 앱 래퍼 ══ */
.app{
  width:100%;height:100%;
  max-width:520px;
  display:flex;flex-direction:column;
  background:var(--bg);
  overflow:hidden;
  position:relative;
}
 
/* ══ 헤더 ══ */
.header{
  flex-shrink:0;
  background:var(--card);
  border-bottom:1px solid var(--bdr);
  padding:14px 16px 0;
  z-index:10;
}
.header-top{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;
}
.header-title{
  display:flex;align-items:center;gap:8px;
}
.header-title .cross{
  font-size:20px;
}
.header-title h1{
  font-size:17px;font-weight:800;
  color:var(--d);letter-spacing:-.3px;
}
.header-count{
  font-size:11px;font-weight:700;
  background:var(--d-lt);color:var(--d);
  padding:3px 9px;border-radius:10px;
  border:1px solid #f0c8c8;
}
 
/* ══ 카테고리 필터 ══ */
.cats{
  display:flex;gap:6px;
  overflow-x:auto;scrollbar-width:none;
  padding-bottom:12px;
}
.cats::-webkit-scrollbar{display:none;}
.cat-btn{
  flex-shrink:0;
  display:flex;align-items:center;gap:4px;
  padding:5px 11px;
  border-radius:20px;border:1.5px solid var(--bdr);
  background:var(--card);color:var(--sub);
  font-size:12px;font-weight:600;
  cursor:pointer;font-family:inherit;
  transition:background .15s,color .15s,border-color .15s;
  white-space:nowrap;
}
.cat-btn .cnt{
  font-size:10px;color:var(--dim);
  background:#f0ede8;padding:1px 5px;
  border-radius:8px;font-weight:700;
}
.cat-btn.on{color:#fff;border-color:transparent;}
.cat-btn.on .cnt{background:rgba(255,255,255,.25);color:rgba(255,255,255,.85);}
 
/* ══ 리스트 영역 ══ */
.list{
  flex:1;min-height:0;
  overflow-y:scroll;-webkit-overflow-scrolling:touch;
  padding:12px 13px 60px;
  display:flex;flex-direction:column;gap:9px;
}
.list::-webkit-scrollbar{display:none;}
 
/* ══ 카드 ══ */
.card{
  background:var(--card);
  border-radius:var(--r);
  border:1px solid var(--bdr);
  box-shadow:0 1px 8px rgba(0,0,0,.06);
  flex-shrink:0;          /* 높이 찌그러짐 방지 */
  cursor:pointer;
  transition:transform .12s,box-shadow .12s;
  overflow:hidden;
}
.card:active{transform:scale(0.983);box-shadow:none;}
 
/* 상단: 카테고리 뱃지 + 운영주체 — 한 줄 */
.card-top{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px 0;
  gap:8px;
}
.card-badge{
  font-size:12px;font-weight:800;
  padding:4px 10px;border-radius:6px;
  color:#fff;white-space:nowrap;flex-shrink:0;
}
.card-operator{
  font-size:11.5px;color:var(--dim);
  overflow:hidden;text-overflow:ellipsis;
  white-space:nowrap;
}
 
/* 중앙: 아이콘 + 사이트명 + 설명 */
.card-body{
  padding:9px 14px 10px;
  display:flex;align-items:center;gap:12px;
}
.card-ico{
  width:44px;height:44px;flex-shrink:0;
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;
}
.card-info{flex:1;min-width:0;}
.card-name{
  font-size:16px;font-weight:700;color:var(--tx);
  word-break:keep-all;line-height:1.38;
  margin-bottom:4px;
}
.card-desc{
  font-size:12px;color:var(--sub);
  line-height:1.55;word-break:keep-all;
  display:-webkit-box;-webkit-line-clamp:2;
  -webkit-box-orient:vertical;overflow:hidden;
}
 
/* 하단: URL */
.card-foot{
  border-top:1px solid #f0ede8;
  padding:8px 14px;
  display:flex;align-items:center;justify-content:space-between;
  background:#faf8f5;
}
.card-url{
  font-size:11px;color:var(--d);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  flex:1;min-width:0;
}
.card-arrow{font-size:15px;color:var(--dim);flex-shrink:0;margin-left:6px;}
 
/* 빈 상태 */
.empty{
  display:none;flex-direction:column;
  align-items:center;justify-content:center;
  padding:60px 20px;gap:12px;color:var(--dim);
  font-size:13px;text-align:center;
}
.empty.show{display:flex;}
.empty-ico{font-size:40px;}
</style>
</head>
<body>
<div class="app">
 
  <!-- 헤더 -->
  <div class="header">
    <div class="header-top">
      <div class="header-title">
        <span class="cross">🌐</span>
        <h1>가톨릭 웹</h1>
      </div>
      <span class="header-count" id="hCount">27개</span>
    </div>
    <div class="cats" id="cats"></div>
  </div>
 
  <!-- 목록 -->
  <div class="list" id="list">
    <div class="empty" id="empty">
      <div class="empty-ico">🔍</div>
      해당 항목이 없습니다.
    </div>
  </div>
</div>
 
<script>
/* ══ 데이터 ══ */
var SITES = [
  /* 공식 중앙기구 */
  {cat:"중앙기구", ico:"🏛️", name:"한국천주교주교회의 (CBCK)",
   op:"한국천주교주교회의", url:"https://cbck.or.kr",
   desc:"한국 천주교 공식 문헌·교리·전례·교회법·발표 자료 제공"},
  {cat:"중앙기구", ico:"📋", name:"한국 천주교 주소록",
   op:"한국천주교주교회의", url:"https://directory.cbck.or.kr/OnlineAddress/Default.aspx",
   desc:"전국 교구·본당·수도회·기관·단체 연락처 및 주소 제공"},
  {cat:"중앙기구", ico:"⛪", name:"한국 천주교 순교자 현양",
   op:"한국천주교주교회의", url:"https://cbck.or.kr/koreanmartyrs",
   desc:"한국 순교자·성지·교회사 관련 자료 제공"},
 
  /* 신앙 포털 */
  {cat:"신앙 포털", ico:"✝️", name:"가톨릭인터넷 굿뉴스",
   op:"천주교 서울대교구", url:"https://www.catholic.or.kr",
   desc:"매일미사·성경·성인·기도문·전례력·신앙자료 제공"},
 
  /* 미디어/방송 */
  {cat:"미디어", ico:"📺", name:"cpbc 가톨릭평화방송",
   op:"가톨릭평화방송", url:"https://www.cpbc.co.kr",
   desc:"매일미사·강론·라디오·영상·신앙 프로그램 제공"},
  {cat:"미디어", ico:"▶️", name:"cpbc 유튜브 채널",
   op:"가톨릭평화방송", url:"https://www.youtube.com/@cpbc",
   desc:"미사·강론·방송 프로그램 영상 제공"},
  {cat:"미디어", ico:"📹", name:"가톨릭신문 유튜브 채널",
   op:"가톨릭신문사", url:"https://www.youtube.com/@KoreaCatholictimes",
   desc:"가톨릭 뉴스·인터뷰·영상 콘텐츠 제공"},
 
  /* 언론 */
  {cat:"언론", ico:"📰", name:"가톨릭신문",
   op:"가톨릭신문사", url:"https://www.catholictimes.org",
   desc:"교회 뉴스·사목·교구 소식·인터뷰·사회 이슈 기사 제공"},
  {cat:"언론", ico:"📄", name:"가톨릭평화신문",
   op:"cpbc", url:"https://news.cpbc.co.kr",
   desc:"가톨릭 뉴스·인물 기사·사목 기사 제공"},
 
  /* 출판/교육 */
  {cat:"출판·교육", ico:"📚", name:"가톨릭출판사",
   op:"가톨릭출판사", url:"https://www.catholicbook.kr",
   desc:"교리·영성·교육용 도서 및 신앙서적 제공"},
  {cat:"출판·교육", ico:"🕊️", name:"성바오로딸",
   op:"성바오로딸수도회", url:"https://www.pauline.or.kr",
   desc:"묵상·영성·생활 신앙 콘텐츠 제공"},
 
  /* 교구 */
  {cat:"교구", ico:"🔴", name:"서울대교구",
   op:"천주교 서울대교구", url:"https://aos.catholic.or.kr",
   desc:"교구 공지·교육·사목 자료·기관 정보 제공"},
  {cat:"교구", ico:"🔴", name:"인천교구",
   op:"천주교 인천교구", url:"http://www.caincheon.or.kr/",
   desc:"교구 공지·사목 자료·기관 정보 제공"},
  {cat:"교구", ico:"🔴", name:"수원교구",
   op:"천주교 수원교구", url:"https://www.casuwon.or.kr/",
   desc:"교구 소식·교육·행사·사목 자료 제공"},
  {cat:"교구", ico:"🔴", name:"의정부교구",
   op:"천주교 의정부교구", url:"http://ucatholic.or.kr/",
   desc:"교구 공지·본당 안내·사목 자료 제공"},
  {cat:"교구", ico:"🔵", name:"원주교구",
   op:"천주교 원주교구", url:"http://www.wjcatholic.or.kr/",
   desc:"교구 소식·교육 자료·공지 제공"},
  {cat:"교구", ico:"🔵", name:"춘천교구",
   op:"천주교 춘천교구", url:"https://www.cccatholic.or.kr/",
   desc:"교구 공지·기관 안내·행사 정보 제공"},
  {cat:"교구", ico:"🟤", name:"대전교구",
   op:"천주교 대전교구", url:"https://www.djcatholic.or.kr/home/",
   desc:"교구 행사·교육·공지·사목 자료 제공"},
  {cat:"교구", ico:"🟤", name:"대구대교구",
   op:"천주교 대구대교구", url:"https://www.daegu-archdiocese.or.kr/",
   desc:"교구 소식·본당·기관 정보·행사 안내 제공"},
  {cat:"교구", ico:"🟤", name:"청주교구",
   op:"천주교 청주교구", url:"https://www.cdcj.or.kr/",
   desc:"교구 공지·교육·사목 자료 제공"},
  {cat:"교구", ico:"🟤", name:"안동교구",
   op:"천주교 안동교구", url:"https://www.acatholic.or.kr/",
   desc:"교구 소식·본당 안내·행사 정보 제공"},
  {cat:"교구", ico:"🟢", name:"마산교구",
   op:"천주교 마산교구", url:"https://cathms.kr/",
   desc:"교구 공지·기관 정보·교육 자료 제공"},
  {cat:"교구", ico:"🟢", name:"부산교구",
   op:"천주교 부산교구", url:"https://www.catholicbusan.or.kr/",
   desc:"교구 소식·행사·교육 자료 제공"},
  {cat:"교구", ico:"🟠", name:"광주대교구",
   op:"천주교 광주대교구", url:"https://www.gjcatholic.or.kr/",
   desc:"교구 공지·사목 자료·기관 안내 제공"},
  {cat:"교구", ico:"🟠", name:"전주교구",
   op:"천주교 전주교구", url:"https://jcatholic.or.kr/index.php",
   desc:"교구 행사·공지·사목 자료 제공"},
  {cat:"교구", ico:"🟡", name:"제주교구",
   op:"천주교 제주교구", url:"https://www.diocesejeju.or.kr/",
   desc:"교구 소식·기관 안내·행사 정보 제공"},
];
 
/* 카테고리 색상 맵 */
var CAT_COLORS = {
  "중앙기구":  "#8B1C2A",
  "신앙 포털": "#1A6B3C",
  "미디어":    "#1A4F8B",
  "언론":      "#5A3E8B",
  "출판·교육": "#7A5230",
  "교구":      "#4A6A4A",
};
var CAT_BG = {
  "중앙기구":  "#fdf0f0",
  "신앙 포털": "#eef7f2",
  "미디어":    "#eef3fd",
  "언론":      "#f3effe",
  "출판·교육": "#f8f3ee",
  "교구":      "#f0f5f0",
};
 
/* ══ 상태 ══ */
var curCat = "전체";
 
/* ══ 카테고리 목록 ══ */
var cats = ["전체"];
SITES.forEach(function(s){ if(cats.indexOf(s.cat)<0) cats.push(s.cat); });
 
/* ══ 필터 버튼 빌드 ══ */
function buildCats(){
  var wrap = document.getElementById('cats');
  cats.forEach(function(c){
    var btn = document.createElement('button');
    btn.className = 'cat-btn' + (c==='전체'?' on':'');
    btn.id = 'cat_' + c;
    var count = c==='전체' ? SITES.length : SITES.filter(function(s){return s.cat===c;}).length;
    btn.innerHTML = c + '<span class="cnt">'+count+'</span>';
    if(c==='전체'){
      btn.style.background = '#C42B2B';
    } else {
      btn.style.setProperty('--cur', CAT_COLORS[c]||'#555');
    }
    btn.addEventListener('click', function(){ setCat(c); });
    wrap.appendChild(btn);
  });
}
 
function setCat(c){
  curCat = c;
  cats.forEach(function(x){
    var btn = document.getElementById('cat_'+x);
    if(!btn) return;
    if(x===c){
      btn.classList.add('on');
      btn.style.background = x==='전체'?'#C42B2B':(CAT_COLORS[x]||'#555');
      btn.style.color = '#fff';
      btn.style.borderColor = 'transparent';
    } else {
      btn.classList.remove('on');
      btn.style.background = '';
      btn.style.color = '';
      btn.style.borderColor = '';
    }
  });
  renderList();
}
 
/* ══ 카드 렌더 ══ */
function renderList(){
  var wrap = document.getElementById('list');
  var empty = document.getElementById('empty');
  Array.from(wrap.querySelectorAll('.card')).forEach(function(el){ el.remove(); });
 
  var filtered = curCat==='전체' ? SITES : SITES.filter(function(s){ return s.cat===curCat; });
  document.getElementById('hCount').textContent = filtered.length+'개';
  empty.classList.toggle('show', filtered.length===0);
 
  filtered.forEach(function(s){
    var color = CAT_COLORS[s.cat] || '#555';
    var bg    = CAT_BG[s.cat]    || '#f8f8f8';
    var displayUrl = s.url.replace(/https?:\/\//,'').replace(/\/$/,'');
 
    /* div + click 방식 — a>div 중첩 렌더링 버그 방지 */
    var card = document.createElement('div');
    card.className = 'card';
 
    var top = document.createElement('div');
    top.className = 'card-top';
    var badge = document.createElement('span');
    badge.className = 'card-badge';
    badge.style.background = color;
    badge.textContent = s.cat;
    var op = document.createElement('span');
    op.className = 'card-operator';
    op.textContent = s.op;
    top.appendChild(badge); top.appendChild(op);
 
    var body = document.createElement('div');
    body.className = 'card-body';
    var ico = document.createElement('div');
    ico.className = 'card-ico';
    ico.style.background = bg;
    ico.textContent = s.ico;
    var info = document.createElement('div');
    info.className = 'card-info';
    var nm = document.createElement('div');
    nm.className = 'card-name';
    nm.textContent = s.name;
    var desc = document.createElement('div');
    desc.className = 'card-desc';
    desc.textContent = s.desc;
    info.appendChild(nm); info.appendChild(desc);
    body.appendChild(ico); body.appendChild(info);
 
    var foot = document.createElement('div');
    foot.className = 'card-foot';
    var url = document.createElement('span');
    url.className = 'card-url';
    url.textContent = displayUrl;
    var arr = document.createElement('span');
    arr.className = 'card-arrow';
    arr.textContent = '›';
    foot.appendChild(url); foot.appendChild(arr);
 
    card.appendChild(top); card.appendChild(body); card.appendChild(foot);
 
    /* 클릭 → location.href (모바일 최적) */
    card.addEventListener('click', (function(url){ return function(){ location.href = url; }; })(s.url));
 
    wrap.appendChild(card);
  });
}
 
/* ══ 초기화 ══ */
buildCats();
renderList();
</script>
</body>
</html>
